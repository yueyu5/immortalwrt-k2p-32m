name: Build ImmortalWrt K2P 32M Firmware

on:
  workflow_dispatch:
permissions:
   contents: write
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 检查项目
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL https://raw.githubusercontent.com/immortalwrt/actions/master/depends/ubuntu-2204)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 拉取ImmortalWrt源码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # ==============================================
    # 核心新增：校验修改是否生效，输出到Actions日志
    # ==============================================
    - name: 校验DTS与MK修改是否生效
      run: |
        cd openwrt
        echo "===================== 1. K2P固件容量配置校验 ====================="
        grep -A 5 "phicomm_k2p" target/linux/ramips/image/mt7621.mk
        echo -e "\n===================== 2. DTS设备名校验 ====================="
        grep "model = " target/linux/ramips/dts/mt7621_phicomm_k2p.dts
        echo -e "\n===================== 3. SPI时钟与红灯修复参数校验 ====================="
        grep -A 2 "spi-max-frequency" target/linux/ramips/dts/mt7621_phicomm_k2p.dts
        echo -e "\n===================== 4. 固件分区大小校验 ====================="
        grep -A 2 "firmware" target/linux/ramips/dts/mt7621_phicomm_k2p.dts
        echo -e "\n===================== 校验完成 ====================="
        # 校验失败直接终止构建，避免白编译
        if ! grep -q "31744k" target/linux/ramips/image/mt7621.mk; then
          echo "❌ 固件容量修改失败，终止构建"
          exit 1
        fi
        #if ! grep -q "broken-flash-reset" target/linux/ramips/dts/mt7621_phicomm_k2p.dts; then
         # echo "❌ 红灯修复参数添加失败，终止构建"
         # exit 1
        #fi
        if ! grep -q "0x1f60000" target/linux/ramips/dts/mt7621_phicomm_k2p.dts; then
          echo "❌ 分区扩容修改失败，终止构建"
          exit 1
        fi
        echo "✅ 所有核心修改全部生效，继续构建"

    - name: 更新feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        chmod +x $GITHUB_WORKSPACE/$DIY_P2_SH
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 加载自定义配置
      run: |
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        cd openwrt
        make defconfig

    - name: 下载编译依赖包
      run: |
        cd openwrt
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      run: |
        cd openwrt
        echo -e "$(nproc) 线程编译"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "===================== 编译完成，固件信息 ====================="
        ls -lh bin/targets/ramips/mt7621/*squashfs-sysupgrade.bin

    - name: 整理固件信息
      id: firmware_info
      run: |
        cd openwrt/bin/targets/ramips/mt7621/
        FW=$(ls *squashfs-sysupgrade.bin)
        SHA256=$(sha256sum $FW | awk '{print $1}')
        SIZE=$(du -h $FW | awk '{print $1}')
        BYTES=$(du -b $FW | awk '{print $1}')
        BUILD_TIME=$(date "+%Y-%m-%d %H:%M:%S")
        # 自动日期TAG：v20260429
        TAG=$(date "+v%Y%m%d")
         
        echo "FW_NAME=$FW" >> $GITHUB_ENV
        echo "FW_SHA256=$SHA256" >> $GITHUB_ENV
        echo "FW_SIZE=$SIZE" >> $GITHUB_ENV
        echo "FW_BYTES=$BYTES" >> $GITHUB_ENV
        echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV
        echo "TAG=$TAG" >> $GITHUB_ENV
         
        echo "固件: $FW"
        echo "大小: $SIZE ($BYTES Bytes)"
        echo "SHA256: $SHA256"
        echo "编译时间: $BUILD_TIME"
        echo "TAG: $TAG"
    - name: 上传固件工件
      uses: actions/upload-artifact@v4
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: ${{ env.FW_NAME }}
        path: openwrt/bin/targets/ramips/mt7621/${{ env.FW_NAME }}
    - name: 发布 Release
      uses: softprops/action-gh-release@v1
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        tag_name: ${{ env.TAG }}
        name: ImmortalWrt-K2P-32M-${{ env.TAG }}
        body: |
          **设备**: Phicomm K2P 32M Flash / 128M 内存
          **源码分支**: ${{ env.REPO_BRANCH }}
          **编译时间**: ${{ env.BUILD_TIME }}
          **固件名称**: ${{ env.FW_NAME }}
          **文件大小**: ${{ env.FW_SIZE }}
          **字节数**: ${{ env.FW_BYTES }} Byte
          **SHA256**: `{{ env.FW_SHA256 }}`
        files: openwrt/bin/targets/ramips/mt7621/${{ env.FW_NAME }}
        draft: false
        prerelease: false
