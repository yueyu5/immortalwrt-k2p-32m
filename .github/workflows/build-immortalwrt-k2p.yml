name: Build ImmortalWrt 23.05 for K2P 32M (SSR-Plus)
on:
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: "开启编译调试模式"
        default: false
  
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 检查项目源码
        uses: actions/checkout@v4

      - name: 初始化编译环境（零报错适配）
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          # 恢复官方软件源，解决包找不到问题
          sudo tee /etc/apt/sources.list << EOF
          deb http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse
          deb http://archive.ubuntu.com/ubuntu/ jammy-backports main restricted universe multiverse
          deb http://security.ubuntu.com/ubuntu/ jammy-security main restricted universe multiverse
          EOF
          # 安装 ImmortalWrt 官方标准编译依赖
          sudo apt update -y
          sudo apt install -y \
          build-essential git libncurses5-dev libssl-dev python3-setuptools \
          python3-wheel unzip gawk flex subversion libelf-dev file rsync patch
          # 系统清理
          sudo apt autoremove -y --purge
          sudo apt clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 拉取 ImmortalWrt 23.05 源码
        working-directory: /workdir
        run: |
          df -h
          git clone $REPO_URL -b $REPO_BRANCH --depth=1 immortalwrt
          ln -sf /workdir/immortalwrt $GITHUB_WORKSPACE/immortalwrt

      - name: 执行 DIY 脚本（32M适配+SSR-Plus源）
        run: |
          chmod +x $DIY_P1_SH
          cd immortalwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装插件源
        run: |
          cd immortalwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 加载编译配置
        run: |
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE immortalwrt/.config
          cd immortalwrt
          make defconfig

      - name: 开启 SSH 调试（可选）
        uses: mxschmitt/action-tmate@v3
        if: ${{ github.event.inputs.debug == 'true' }}
        with:
          limit-access-to-actor: true

      - name: 编译固件
        id: compile
        run: |
          cd immortalwrt
          make download -j$(nproc)
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
      - name: 生成编译时间
        id: build_time
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
           echo "BUILD_TIME=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_OUTPUT
      - name: 上传固件成品
        if: steps.compile.outputs.status == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ImmortalWrt-23.05-K2P-32M-SSR-Plus
          path: |
            immortalwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
            immortalwrt/bin/targets/ramips/mt7621/*factory.bin
          retention-days: 30

      - name: 自动发布 Release
        if: steps.compile.outputs.status == 'success' && !cancelled()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: immortalwrt-23.05-k2p-32m-ssrplus-${{ github.run_number }}
          files: |
            immortalwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
            immortalwrt/bin/targets/ramips/mt7621/*factory.bin
          body: |
            ## 固件信息
            - 源码：ImmortalWrt openwrt-23.05
            - 设备：Phicomm K2P (32M 硬改)
            - 集成插件：SSR-Plus
            - 支持协议：Shadowsocks(SS)、ShadowsocksR(SSR)、VMess/VLESS
            - 编译时间：${{ steps.build_time.outputs.BUILD_TIME }}
